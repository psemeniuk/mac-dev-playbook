---

configure_osx: true
osx_script: "~/.osx"

configure_dotfiles: true
dotfiles_repo: https://github.com/psemeniuk/dotfiles.git
dotfiles_repo_local_destination: ~/development/private/dotfiles
dotfiles_files:
  - .gitconfig
  - .gitignore_global
  - .config/opencode/opencode.jsonc
  - .osx
  - .zshrc
  - .bin/idea
  - .config/karabiner/karabiner.json
  - .yabairc
  - .skhdrc
dotfiles_gitconfig_email: patryk.semen@gmail.com


configure_sublime: false
configure_terminal: false
configure_sudoers: false

configure_dock: true
dockitems_remove:
  - Launchpad
  - TV
  - Podcasts
  - App Store
  - Contacts
  - Notes
  - Reminders
  - Maps
  - Photos
  - FaceTime
  - iTunes
  - iBooks
  - Siri
  - Safari
  - Messages
  - Calendar
  - Music
  - Keynote
  - Numbers
  - Pages
  - System Preferences
  - Downloads
  - Docker Desktop
  - Freeform
  - System Settings
dockitems_persist:
  - name: "Google Chrome"
    path: "/Applications/Google Chrome.app/"
    pos: 2
  - name: "IntelliJ IDEA"
    path: "/Applications/IntelliJ IDEA.app/"
    pos: 3
  - name: "Slack"
    path: "/Applications/Slack.app/"
    pos: 4
  - name: "Mail"
    path: "/Applications/Mail.app/"
    pos: 5
  - name: "Ghostty"
    path: "/Applications/Ghostty.app/"
    pos: 6

homebrew_installed_packages:
  - awscli
  - aws-shell
  - curl
  - nmap
  - docker
  - docker-compose
  - go
  - helm
  - hyperfine
  - kubernetes-cli
  - opencode
  - pandoc
  - pre-commit
  - protobuf
  - rust
  - socat
  - steampipe
  - telnet
  - terraform
  - terraform-docs
  - terragrunt
  - tflint
  - git
  - htop
  - jq
  - maven
  - node
  - tree
  - wget
  - watch
  - wrk
  - zsh
  - gh
  - rustup
  - stern
  - calc
  - bat
  - gping
  - koekeishiya/formulae/yabai #TODO service start; restart on changes in file; check if starts automatically
  - koekeishiya/formulae/skhd #TODO service start; restart on changes in file; check if starts automatically
  - act
  - bettercap
  - k6
  - ripgrep
  - uv

homebrew_cask_apps:
  - docker
  - docker-desktop
  - ghostty
  - intellij-idea
  - jetbrains-toolbox
  - slack
  - openlens
  - temurin@25
  - karabiner-elements
  - lm-studio
  - wireshark
  - wireshark-app
  - middleclick
  - alt-tab

configure_dev_env: true
